<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 3s linear infinite;
        }
        .ai-pulse-bg {
            filter: blur(48px);
            opacity: 0.15;
            background: radial-gradient(circle, #0078D4 0%, transparent 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<!-- TopAppBar Shell (Suppressed Nav for Transactional State) -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-[#FAF9F8]">
<div class="flex items-center gap-3">
<span class="text-[#005FAA] font-['Plus_Jakarta_Sans'] font-extrabold tracking-tighter text-2xl">MinuteMind</span>
</div>
<div class="flex items-center gap-4">
<div class="w-8 h-8 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="Professional headshot of a person with a friendly expression in a modern office setting with soft natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAuxClY6raktPTFl3K2bfYeo6wezXCGe89H5aZWuIbLbVPFQS-C13XRH6I-FkbI2fXyxR2l_BSGtilZVC-IGrGalMVZiKneqj3vSL-ZzuPzMln0Fz4Xdqe9fW3j9ARwSWoJ0gA7zEy4yWWoJT5__MkX9Zg9B3mnyQbWQ0K_aajfnDbx7qUz_iIDvzWb30fj9-yrwPPEp9_VYLqeQof5Ts_g28v5wpcEr3B3hft0Z4lbJSRqv3AzHgpqFULFY7UMdyI4brGCxfajA8E"/>
</div>
</div>
</header>
<main class="relative min-h-screen flex flex-col items-center justify-center px-6 pt-16">
<!-- Background AI Pulse Component -->
<div class="absolute inset-0 flex items-center justify-center -z-10 overflow-hidden">
<div class="ai-pulse-bg w-[500px] h-[500px] rounded-full"></div>
</div>
<!-- Central Loading Hero -->
<div class="w-full max-w-md flex flex-col items-center text-center">
<h1 class="font-headline font-bold text-3xl tracking-tight text-on-surface mb-12">Processing Meeting...</h1>
<!-- Large Spinning Blue Ring -->
<div class="relative flex items-center justify-center mb-16">
<!-- Outer Ring -->
<div class="w-48 h-48 rounded-full border-[6px] border-surface-container-high"></div>
<!-- Active Spinning Segment -->
<div class="absolute w-48 h-48 rounded-full border-[6px] border-transparent border-t-primary animate-spin-slow"></div>
<!-- Inner Branding/Icon -->
<div class="absolute flex flex-col items-center">
<span class="material-symbols-outlined text-primary text-5xl" data-icon="mic_none">mic_none</span>
<span class="font-label text-[10px] font-bold tracking-[0.2em] text-primary mt-2 uppercase">Analyzing</span>
</div>
</div>
<!-- Processing Steps (Editorial Intelligence Pattern) -->
<div class="w-full space-y-4 text-left px-4">
<!-- Step 1: Completed -->
<div class="flex items-center gap-5 p-5 bg-surface-container-lowest rounded-xl shadow-[0px_12px_32px_rgba(26,28,28,0.04)] transition-all duration-300">
<div class="flex-shrink-0 w-8 h-8 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-xl" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<div class="flex flex-col">
<span class="font-headline font-semibold text-on-surface text-base">Uploading audio...</span>
<span class="font-body text-xs text-on-surface-variant">2.4MB / 2.4MB complete</span>
</div>
</div>
<!-- Step 2: Active -->
<div class="flex items-center gap-5 p-5 bg-surface-container-lowest rounded-xl border-l-4 border-primary shadow-[0px_12px_32px_rgba(26,28,28,0.04)] scale-[1.02] transition-all duration-300">
<div class="flex-shrink-0 w-8 h-8 rounded-full bg-primary-container/10 flex items-center justify-center relative">
<div class="absolute inset-0 rounded-full border-2 border-primary border-t-transparent animate-spin"></div>
<span class="material-symbols-outlined text-primary text-xl" data-icon="graphic_eq">graphic_eq</span>
</div>
<div class="flex flex-col">
<div class="flex items-center gap-2">
<span class="font-headline font-bold text-primary text-base">Transcribing audio...</span>
</div>
<span class="font-body text-xs text-on-surface-variant italic">Decoding speaker 2...</span>
</div>
</div>
<!-- Step 3: Pending -->
<div class="flex items-center gap-5 p-5 bg-surface-container-low/50 rounded-xl opacity-60 transition-all duration-300">
<div class="flex-shrink-0 w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant text-xl" data-icon="auto_awesome">auto_awesome</span>
</div>
<div class="flex flex-col">
<span class="font-headline font-semibold text-on-surface-variant text-base">Generating meeting minutes...</span>
<span class="font-body text-xs text-on-surface-variant">Extracting action items next</span>
</div>
</div>
</div>
<!-- Footer Meta -->
<div class="mt-12">
<p class="font-label text-[11px] font-medium tracking-widest text-on-surface-variant/40 uppercase">Powered by MinuteMind Intelligence v4.2</p>
</div>
</div>
</main>
<!-- Bottom Navigation Suppressed for Focused State -->
</body></html>
